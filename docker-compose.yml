services:
  postgres:
    image: postgres:16-alpine
    container_name: statify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: statify
      POSTGRES_PASSWORD: statify
      POSTGRES_DB: statify
    ports:
      - "5432:5432"
    volumes:
      - statify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statify -d statify"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: statify-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  statify-postgres-data:
